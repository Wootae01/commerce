name: Deploy to AWS

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:
    inputs:
      profile:
        description: "Spring profile"
        required: true
        default: "dev"

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: commerce-ecr

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Configure AWS Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Get CodeDeploy bucket name
        run: |
          BUCKET=$(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name, 'commerce-codedeploy')].Name | [0]" \
            --output text)
          echo "CODEDEPLOY_BUCKET=$BUCKET" >> $GITHUB_ENV

      - name: Save secrets to SSM Parameter Store
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          aws ssm put-parameter --name "/commerce/IMAGE" \
            --value "$IMAGE" --type String --overwrite

          aws ssm put-parameter --name "/commerce/SPRING_PROFILES_ACTIVE" \
            --value "${{ env.PROFILE }}" --type String --overwrite

          aws ssm put-parameter --name "/commerce/NAVER_CLIENT_ID" \
            --value "${{ secrets.NAVER_CLIENT_ID }}" --type String --overwrite

          aws ssm put-parameter --name "/commerce/NAVER_CLIENT_SECRET" \
            --value "${{ secrets.NAVER_CLIENT_SECRET }}" --type SecureString --overwrite

          aws ssm put-parameter --name "/commerce/TOSS_SECRET_KEY" \
            --value "${{ secrets.TOSS_SECRET_KEY }}" --type SecureString --overwrite

          aws ssm put-parameter --name "/commerce/TOSS_CLIENT_KEY" \
            --value "${{ secrets.TOSS_CLIENT_KEY }}" --type String --overwrite

      - name: Create deploy bundle and upload to S3
        run: |
          zip -r deploy.zip appspec.yml scripts/
          aws s3 cp deploy.zip s3://${{ env.CODEDEPLOY_BUCKET }}/deploy-${{ github.sha }}.zip

      - name: Deploy via CodeDeploy
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name commerce-app \
            --deployment-group-name commerce-deployment-group \
            --s3-location bucket=${{ env.CODEDEPLOY_BUCKET }},key=deploy-${{ github.sha }}.zip,bundleType=zip \
            --query 'deploymentId' \
            --output text)

          echo "Deployment ID: $DEPLOYMENT_ID"

          aws deploy wait deployment-successful \
            --deployment-id $DEPLOYMENT_ID