name: Deploy to AWS

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:
    inputs:
      profile:
        description: "Spring profile"
        required: true
        default: "dev"

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: commerce-ecr

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Configure AWS Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Deploy to EC2 using SSM (Blue-Green)
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters commands='[
              "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "SPRING_DATASOURCE_URL=\"jdbc:mysql://${{ secrets.RDS_ENDPOINT }}/commerce?useSSL=false&allowPublicKeyRetrieval=true\" SPRING_DATASOURCE_USERNAME=${{ secrets.RDS_USERNAME }} SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }} AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }} NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }} TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }} TOSS_CLIENT_KEY=${{ secrets.TOSS_CLIENT_KEY }} bash /home/ubuntu/deploy.sh ${{ env.IMAGE }} ${{ env.PROFILE }}"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text)
            echo "[$i/60] Status: $STATUS"
            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then break; fi
            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '{Status: Status, Output: StandardOutputContent, Error: StandardErrorContent}'

          if [ "$STATUS" != "Success" ]; then exit 1; fi