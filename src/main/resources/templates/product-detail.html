<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.name} + ' - Commerce'">상품 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .main-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 16px;
        }
        .detail-img {
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .price-tag {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0d6efd;
        }
        .btn-cart {
            border-radius: 10px;
            padding: 12px 28px;
            font-weight: 600;
        }
        .btn-buy {
            border-radius: 10px;
            padding: 12px 28px;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: siteHeader}"></div>

    <div class="container my-5" style="max-width: 1000px;">
        <div class="row g-5 align-items-start">
            <!-- 이미지 -->
            <div class="col-md-5">
                <img th:src="${product.mainImageUrl}" class="main-img shadow-sm" alt="상품 이미지">
            </div>

            <!-- 상품 정보 -->
            <div class="col-md-7">
                <nav aria-label="breadcrumb" class="mb-3">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/" class="text-decoration-none">홈</a></li>
                        <li class="breadcrumb-item active" th:text="${product.name}">상품명</li>
                    </ol>
                </nav>

                <h2 class="fw-bold mb-3" th:text="${product.name}">상품명</h2>

                <div class="price-tag mb-4"
                     th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'">가격</div>

                <p class="text-muted mb-4" th:text="${product.description}">상품 설명</p>

                <div th:if="${product.options != null and !#lists.isEmpty(product.options)}" class="mb-4">
                    <label class="form-label fw-semibold">옵션 선택</label>
                    <select class="form-select" id="optionSelect">
                        <option value="">-- 옵션을 선택하세요 --</option>
                        <option th:each="option : ${product.options}"
                                th:value="${option.id}"
                                th:text="${option.name} + (${option.additionalPrice} > 0 ? ' (+' + ${#numbers.formatInteger(option.additionalPrice, 3, 'COMMA')} + '원)' : '')">
                        </option>
                    </select>
                </div>

                <div class="p-3 rounded-3 mb-4"
                     style="background:#f8f9fa; border: 1px solid #e9ecef;">
                    <div class="d-flex justify-content-between text-muted small">
                        <span>배송비</span><span class="fw-semibold text-dark">3,000원</span>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <form th:action="@{'/cart/add/' + ${product.id}}" method="post">
                        <input type="hidden" name="quantity" value="1">
                        <input type="hidden" name="productOptionId" id="cartOptionId">
                        <button type="submit" class="btn btn-outline-primary btn-cart">
                            🛒 장바구니
                        </button>
                    </form>
                    <a id="buyNowBtn" class="btn btn-primary btn-buy flex-grow-1 text-center"
                       th:href="@{/orders/buy-now(productId=${product.id}, quantity=1)}">
                        바로 구매
                    </a>
                </div>
            </div>
        </div>

        <hr class="my-5">

        <!-- 상품 상세 설명 -->
        <div class="mb-5">
            <h5 class="fw-bold mb-3">상품 상세 설명</h5>
            <div class="p-4 bg-white rounded-4 shadow-sm">
                <p class="mb-0 text-muted" th:text="${product.description}">상품 설명</p>
            </div>
        </div>

        <!-- 상세 이미지 -->
        <div th:if="${product.images != null and !#lists.isEmpty(product.images)}">
            <h5 class="fw-bold mb-4">상세 이미지</h5>
            <div class="text-center">
                <img th:each="img : ${product.images}" th:src="${img}"
                     class="img-fluid d-block mx-auto mb-4 detail-img" alt="상세 이미지">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const productId = [[${product.id}]];
        const optionSelect = document.getElementById('optionSelect');
        const buyNowBtn = document.getElementById('buyNowBtn');

        if (optionSelect) {
            optionSelect.addEventListener('change', function () {
                const optionId = this.value;
                document.getElementById('cartOptionId').value = optionId || '';
                buyNowBtn.href = `/orders/buy-now?productId=${productId}&quantity=1` + (optionId ? `&optionId=${optionId}` : '');
            });
        }
    </script>
</body>
</html>
