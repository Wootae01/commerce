<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문 내역</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6fb; }
        .order-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.11);
        }
        .order-status { font-weight: 600; color: #4d9fff; }
        .order-item-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }
        .btn-primary { background-color: #4d9fff; border-color: #4d9fff; border-radius: 8px; }
        .btn-primary:hover { background-color: #3a8de8; border-color: #3a8de8; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader}"></div>

<div class="container py-5" style="max-width: 860px;">
    <h4 class="fw-bold mb-4">주문 내역</h4>

    <div th:if="${page.content.isEmpty()}" class="text-center py-5">
        <div style="font-size: 4rem;">📦</div>
        <h5 class="mt-3 fw-semibold text-muted">아직 주문 내역이 없습니다</h5>
        <a href="/" class="btn btn-primary mt-3 px-4">쇼핑하러 가기</a>
    </div>

    <div class="row g-3">
        <div class="col-12" th:each="order : ${page.content}">
            <div class="card order-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <div class="fw-semibold">주문번호 <span class="text-muted" th:text="${order.orderNumber}"></span></div>
                        <div class="text-muted small" th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd')}"></div>
                    </div>
                    <span class="order-status" th:text="${order.orderStatus.text}"></span>
                </div>

                <div class="d-flex align-items-center gap-3 mb-3" th:each="product : ${order.productDTOS}">
                    <a class="text-decoration-none text-dark d-flex align-items-center gap-3" th:href="@{'/products/' + ${product.id}}">
                        <img th:src="@{${product.mainImageURL}}" class="order-item-img flex-shrink-0">
                        <div>
                            <div class="fw-semibold" th:text="${product.productName}"></div>
                            <div class="text-muted small" th:if="${product.optionName != null}" th:text="'옵션: ' + ${product.optionName}"></div>
                            <div class="text-muted small" th:text="'수량: ' + ${product.quantity} + '개'"></div>
                            <div class="fw-bold text-danger small" th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'"></div>
                        </div>
                    </a>
                </div>

                <hr class="my-2">

                <div class="d-flex justify-content-between align-items-center">
                    <div class="fw-semibold">총 결제금액
                        <span class="text-danger ms-1" th:text="${#numbers.formatInteger(order.totalPrice, 3, 'COMMA')} + '원'"></span>
                    </div>
                    <div class="d-flex gap-2">
                        <form th:if="${order.orderStatus.name() == 'PAID' or order.orderStatus.name() == 'READY'}"
                              th:action="@{'/pay/' + ${order.orderNumber} + '/cancel'}"
                              method="post"
                              onsubmit="return confirm('주문을 취소할까요?');">
                            <button type="submit" class="btn btn-outline-danger btn-sm">주문 취소</button>
                        </form>
                        <a th:href="@{'/orders/detail/' + ${order.orderNumber}}" class="btn btn-outline-secondary btn-sm">상세 보기</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/pagination :: pager('/orders/list', ${page}, '')}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
