<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6fb; }
        .menu-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            color: inherit;
        }
        .menu-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-header :: adminHeader}"></div>

<div class="container py-5">
    <div class="mb-5">
        <h4 class="fw-bold mb-1">대시보드</h4>
        <p class="text-muted mb-0">관리할 항목을 선택하세요.</p>
    </div>

    <div class="row g-4">
        <div class="col-6 col-md-3">
            <a href="/admin/products" class="menu-card card p-4">
                <div class="menu-icon" style="background:rgba(77,159,255,0.12);">🛍️</div>
                <div class="fw-bold fs-6">상품 관리</div>
                <div class="text-muted small mt-1">상품 등록 · 수정 · 삭제</div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a href="/admin/orders" class="menu-card card p-4">
                <div class="menu-icon" style="background:rgba(40,199,111,0.12);">📦</div>
                <div class="fw-bold fs-6">주문 관리</div>
                <div class="text-muted small mt-1">주문 조회 · 상태 변경</div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
