<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #1a1a2e;
        }
        .brand-dot {
            color: #4d9fff;
        }
        .admin-badge {
            display: inline-block;
            background: rgba(77,159,255,0.12);
            color: #4d9fff;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 6px;
            padding: 2px 10px;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .form-control:focus {
            border-color: #4d9fff;
            box-shadow: 0 0 0 0.2rem rgba(77,159,255,0.2);
        }
        .btn-admin {
            background: #4d9fff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px 0;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(77,159,255,0.3);
        }
        .btn-admin:hover {
            background: #3a8eef;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(77,159,255,0.4);
        }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="card login-card mx-auto">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="brand-logo">Commerce<span class="brand-dot">.</span></div>
                <div class="admin-badge">ADMIN</div>
                <p class="text-muted mt-2 mb-0 small">관리자 계정으로 로그인하세요</p>
            </div>

            <div th:if="${error}" class="alert alert-danger rounded-3" role="alert">
                아이디 또는 비밀번호가 올바르지 않습니다.
            </div>

            <form th:action="@{/admin/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold text-secondary small">아이디</label>
                    <input type="text" id="username" name="username" class="form-control form-control-lg"
                           placeholder="아이디를 입력하세요" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold text-secondary small">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg"
                           placeholder="비밀번호를 입력하세요" required>
                </div>

                <button type="submit" class="btn btn-admin w-100 fs-6">로그인</button>
            </form>

            <div class="text-center mt-4">
                <a href="/" class="text-muted small text-decoration-none">← 메인 페이지로 돌아가기</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
