<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .field-error{
            border-color: #dc3545;
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h4 class="mb-3">상품 등록</h4>

    <form th:action="@{'/admin/products/edit/' + ${productId}}" th:object="${product}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">상품명</label>
            <input type="text" th:field="*{name}" placeholder="상품명을 입력하세요" class="form-control" th:errorclass="field-error">
            <div th:errors="*{name}" th:errorclass="field-error">
                상품명 오류
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">가격</label>
            <input type="text" th:field="*{price}" placeholder="가격을 입력하세요" class="form-control" th:errorclass="field-error">
            <div th:errors="*{price}" th:errorclass="field-error">
                가격 오류
            </div>
        </div>

        <div class="mb-3" id="stockField">
            <label class="form-label">재고</label>
            <input type="number" th:field="*{stock}" placeholder="재고를 입력하세요" class="form-control" min="0">
        </div>

        <div class="mb-3">
            <label class="form-label">옵션</label>
            <div id="optionList">
                <div th:each="option, stat : *{productOptionDTOList}" class="d-flex gap-2 mb-2 option-row">
                    <input type="hidden" th:name="|productOptionDTOList[${stat.index}].id|" th:value="${option.id}">
                    <input type="text" th:name="|productOptionDTOList[${stat.index}].name|" th:value="${option.name}" placeholder="옵션명 (예: M+블랙)" class="form-control">
                    <input type="number" th:name="|productOptionDTOList[${stat.index}].stock|" th:value="${option.stock}" placeholder="재고" class="form-control" style="width: 120px;">
                    <input type="number" th:name="|productOptionDTOList[${stat.index}].additionalPrice|" th:value="${option.additionalPrice}" placeholder="추가금액" class="form-control" style="width: 120px;">
                    <button type="button" class="btn btn-outline-danger" onclick="removeOption(this)">삭제</button>
                </div>
            </div>
            <button type="button" class="btn btn-outline-secondary btn-sm mt-1" onclick="addOption()">+ 옵션 추가</button>
        </div>

        <div class="mb-3">
            <label class="form-label">상품 설명</label>
            <textarea type="text" th:field="*{description}" rows="4" placeholder="상품 설명을 입력하세요" class="form-control"></textarea>
        </div>

        <h5 class="mb-3">대표 이미지</h5>
        <div class="mb-3">
            <div th:if="${product.mainImageUrl}">
                <img th:src="@{${product.mainImageUrl}}" width="250" class="mb-2 rounded"/>
            </div>
            <label class="form-label" mt-3>새 대표 이미지 업로드</label>
            <input type="file" name="mainImage" class="form-control">
        </div>

        <h5 class="mb-3 mt-4">기존 이미지</h5>
        <div class="mb-3">
            <div class="d-flex flex-wrap gap-4">
                <div th:each="image : ${product.images}" class="text-center">
                    <img th:src="@{${image.url}}" width="250" class="rounded shadow-sm d-block mb-2">
                    <label style="cursor: pointer;">
                        <input type="checkbox" name="deleteImageIds" th:value="${image.id}" style="transform: scale(1.3); margin-right: 6px;">
                        삭제
                    </label>
                </div>
            </div>

            <label class="form-label mt-3">새 이미지 추가</label>
            <input type="file" name="newImages" class="form-control" multiple>
        </div>

        <button type="submit" class="btn btn-primary">등록</button>
        <a href="/admin/products" class="btn btn-secondary">취소</a>
    </form>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function updateStockVisibility() {
        const hasOptions = document.querySelectorAll('#optionList .option-row').length > 0;
        document.getElementById('stockField').style.display = hasOptions ? 'none' : '';
    }

    // 페이지 로드 시 초기 상태 반영
    updateStockVisibility();

    function addOption() {
        const list = document.getElementById('optionList');
        const index = list.querySelectorAll('.option-row').length;
        const row = document.createElement('div');
        row.className = 'd-flex gap-2 mb-2 option-row';
        row.innerHTML = `
            <input type="hidden" name="productOptionDTOList[${index}].id" value="">
            <input type="text" name="productOptionDTOList[${index}].name" placeholder="옵션명 (예: M+블랙)" class="form-control">
            <input type="number" name="productOptionDTOList[${index}].stock" placeholder="재고" class="form-control" style="width: 120px;">
            <input type="number" name="productOptionDTOList[${index}].additionalPrice" placeholder="추가금액" class="form-control" style="width: 120px;">
            <button type="button" class="btn btn-outline-danger" onclick="removeOption(this)">삭제</button>
        `;
        list.appendChild(row);
        updateStockVisibility();
    }

    function removeOption(btn) {
        btn.closest('.option-row').remove();
        reindex();
        updateStockVisibility();
    }

    function reindex() {
        document.querySelectorAll('#optionList .option-row').forEach((row, i) => {
            row.querySelectorAll('input').forEach(input => {
                input.name = input.name.replace(/\[\d+]/, `[${i}]`);
            });
        });
    }
</script>
</body>
</html>
