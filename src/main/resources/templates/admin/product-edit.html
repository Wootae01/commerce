<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>상품 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6fb; }
        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        }
        .field-error {
            border-color: #dc3545;
            color: #dc3545;
        }
        .btn-primary {
            background-color: #4d9fff;
            border-color: #4d9fff;
            border-radius: 8px;
        }
        .btn-primary:hover {
            background-color: #3a8de8;
            border-color: #3a8de8;
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        .image-thumb {
            border-radius: 10px;
            object-fit: cover;
        }
        .delete-label {
            font-size: 0.8rem;
            color: #dc3545;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-header :: adminHeader}"></div>

<div class="container py-5" style="max-width: 760px;">
    <div class="mb-4">
        <h4 class="fw-bold mb-1">상품 수정</h4>
        <p class="text-muted mb-0">상품 정보를 수정하세요.</p>
    </div>

    <form th:action="@{'/admin/products/edit/' + ${productId}}" th:object="${product}" method="post" enctype="multipart/form-data">

        <!-- 기본 정보 -->
        <div class="card form-card p-4 mb-4">
            <p class="section-title">기본 정보</p>
            <div class="mb-3">
                <label class="form-label fw-semibold">상품명</label>
                <input type="text" th:field="*{name}" placeholder="상품명을 입력하세요" class="form-control" th:errorclass="field-error">
                <div th:errors="*{name}" class="field-error small mt-1"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">가격</label>
                <input type="text" th:field="*{price}" placeholder="가격을 입력하세요" class="form-control" th:errorclass="field-error">
                <div th:errors="*{price}" class="field-error small mt-1"></div>
            </div>
            <div id="stockField">
                <label class="form-label fw-semibold">재고</label>
                <input type="number" th:field="*{stock}" placeholder="재고를 입력하세요" class="form-control" min="0">
            </div>
            <div class="mt-3">
                <label class="form-label fw-semibold">상품 설명</label>
                <textarea th:field="*{description}" rows="4" placeholder="상품 설명을 입력하세요" class="form-control"></textarea>
            </div>
        </div>

        <!-- 옵션 -->
        <div class="card form-card p-4 mb-4">
            <p class="section-title">옵션</p>
            <div id="optionList">
                <div th:each="option, stat : *{productOptionDTOList}" class="d-flex gap-2 mb-2 option-row">
                    <input type="hidden" th:name="|productOptionDTOList[${stat.index}].id|" th:value="${option.id}">
                    <input type="text" th:name="|productOptionDTOList[${stat.index}].name|" th:value="${option.name}" placeholder="옵션명 (예: M+블랙)" class="form-control">
                    <input type="number" th:name="|productOptionDTOList[${stat.index}].stock|" th:value="${option.stock}" placeholder="재고" class="form-control" style="width: 110px;">
                    <input type="number" th:name="|productOptionDTOList[${stat.index}].additionalPrice|" th:value="${option.additionalPrice}" placeholder="추가금액" class="form-control" style="width: 110px;">
                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeOption(this)">삭제</button>
                </div>
            </div>
            <button type="button" class="btn btn-outline-secondary btn-sm mt-2" onclick="addOption()">+ 옵션 추가</button>
        </div>

        <!-- 이미지 -->
        <div class="card form-card p-4 mb-4">
            <p class="section-title">이미지</p>

            <div class="mb-4">
                <label class="form-label fw-semibold">대표 이미지</label>
                <div th:if="${product.mainImageUrl}" class="mb-2">
                    <img th:src="@{${product.mainImageUrl}}" width="200" class="image-thumb">
                </div>
                <input type="file" name="mainImage" class="form-control">
            </div>

            <div th:if="${product.images}" class="mb-4">
                <label class="form-label fw-semibold">기존 이미지</label>
                <div class="d-flex flex-wrap gap-3 mt-2">
                    <div th:each="image : ${product.images}" class="text-center">
                        <img th:src="@{${image.url}}" width="120" class="image-thumb d-block mb-1">
                        <label class="delete-label">
                            <input type="checkbox" name="deleteImageIds" th:value="${image.id}" class="me-1">
                            삭제
                        </label>
                    </div>
                </div>
            </div>

            <div>
                <label class="form-label fw-semibold">이미지 추가</label>
                <input type="file" name="newImages" class="form-control" multiple>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">저장</button>
            <a href="/admin/products" class="btn btn-outline-secondary px-4">취소</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    updateStockVisibility();

    function updateStockVisibility() {
        const hasOptions = document.querySelectorAll('#optionList .option-row').length > 0;
        document.getElementById('stockField').style.display = hasOptions ? 'none' : '';
    }

    function addOption() {
        const list = document.getElementById('optionList');
        const index = list.querySelectorAll('.option-row').length;
        const row = document.createElement('div');
        row.className = 'd-flex gap-2 mb-2 option-row';
        row.innerHTML = `
            <input type="hidden" name="productOptionDTOList[${index}].id" value="">
            <input type="text" name="productOptionDTOList[${index}].name" placeholder="옵션명 (예: M+블랙)" class="form-control">
            <input type="number" name="productOptionDTOList[${index}].stock" placeholder="재고" class="form-control" style="width: 110px;">
            <input type="number" name="productOptionDTOList[${index}].additionalPrice" placeholder="추가금액" class="form-control" style="width: 110px;">
            <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeOption(this)">삭제</button>
        `;
        list.appendChild(row);
        updateStockVisibility();
    }

    function removeOption(btn) {
        btn.closest('.option-row').remove();
        reindex();
        updateStockVisibility();
    }

    function reindex() {
        document.querySelectorAll('#optionList .option-row').forEach((row, i) => {
            row.querySelectorAll('input').forEach(input => {
                input.name = input.name.replace(/\[\d+]/, `[${i}]`);
            });
        });
    }
</script>
</body>
</html>
