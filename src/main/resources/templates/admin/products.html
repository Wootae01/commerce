<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>상품 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6fb; }
        .thumb {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 10px;
        }
        .rank-input { width: 90px; }
        .admin-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        }
        .table thead th {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #6c757d;
            border-bottom: 2px solid #e9ecef;
            background: #f8f9fa;
        }
        .table tbody tr:hover { background-color: rgba(77,159,255,0.04); }
        .btn-primary-custom {
            background: #4d9fff;
            color: #fff;
            border: none;
            border-radius: 8px;
        }
        .btn-primary-custom:hover { background: #3a8eef; color: #fff; }
    </style>
</head>

<body>
<div th:replace="~{fragments/admin-header :: adminHeader}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0">상품 관리</h5>
    </div>

    <!-- 상단 버튼 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <form class="d-flex gap-2" method="get" action="/admin/products/search">
            <input class="form-control" style="max-width:240px;" type="text" name="keyword"
                   placeholder="상품명 검색" th:value="${param.keyword}">
            <button class="btn btn-outline-secondary" type="submit">검색</button>
        </form>

        <div class="d-flex gap-2">
            <a href="/admin/products/new" class="btn btn-primary-custom">+ 상품 등록</a>
            <button class="btn btn-outline-primary" type="submit" form="featureForm">홈 노출 저장</button>
        </div>
    </div>

    <!-- 홈 노출 설정 폼 -->
    <form id="featureForm" method="post" action="/admin/products/featured">
        <div class="admin-card card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>이미지</th>
                            <th>상품명</th>
                            <th>가격</th>
                            <th>재고</th>
                            <th>등록일</th>
                            <th class="text-center">홈 노출</th>
                            <th class="text-center">순서</th>
                            <th class="text-center pe-4">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product, stat : ${page.content}">
                            <td class="ps-4 text-muted small" th:text="${product.id}"></td>
                            <td>
                                <img th:src="${product.mainImageUrl}" alt="상품 이미지" class="thumb">
                            </td>
                            <td class="fw-semibold" th:text="${product.name}"></td>
                            <td th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'"></td>
                            <td>
                                <span th:if="${product.stock > 0}" class="badge rounded-pill bg-success"
                                      th:text="${product.stock}"></span>
                                <span th:if="${product.stock == 0}" class="badge rounded-pill bg-danger">품절</span>
                            </td>
                            <td class="text-muted small"
                                th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd')}"></td>

                            <td class="text-center">
                                <input type="hidden"
                                       th:name="|items[${stat.index}].productId|"
                                       th:value="${product.id}"/>
                                <input class="form-check-input featured-check"
                                       type="checkbox"
                                       th:name="|items[${stat.index}].featured|"
                                       th:checked="${product.featured}"/>
                            </td>

                            <td class="text-center">
                                <input class="form-control form-control-sm d-inline-block rank-input featured-rank"
                                       type="number" min="1" max="999"
                                       th:name="|items[${stat.index}].featuredRank|"
                                       th:value="${product.featuredRank}"
                                       th:disabled="${!product.featured}"
                                       placeholder="예: 1"/>
                                <div class="text-muted" style="font-size:0.7rem;">작을수록 상단</div>
                            </td>

                            <td class="text-center pe-4">
                                <a th:href="@{'/admin/products/edit/' + ${product.id}}"
                                   class="btn btn-sm btn-outline-primary me-1">수정</a>
                                <form th:action="@{'/admin/products/delete/' + ${product.id}}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-3 text-muted small">
            * 홈 노출 체크 후 순서를 입력하고 "홈 노출 저장"을 누르면 반영됩니다.<br>
            * 체크 해제 시 순서는 자동으로 비워집니다.
        </div>
    </form>

    <div th:replace="~{fragments/pagination :: pager('/admin/products', ${page}, '')}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("change", (e) => {
        if (!e.target.classList.contains("featured-check")) return;
        const tr = e.target.closest("tr");
        const rankInput = tr.querySelector(".featured-rank");
        if (!rankInput) return;
        if (e.target.checked) {
            rankInput.disabled = false;
            if (!rankInput.value) rankInput.focus();
        } else {
            rankInput.value = "";
            rankInput.disabled = true;
        }
    });

    document.getElementById("featureForm").addEventListener("submit", (e) => {
        const rows = document.querySelectorAll("tbody tr");
        for (const tr of rows) {
            const chk = tr.querySelector(".featured-check");
            const rank = tr.querySelector(".featured-rank");
            if (chk && chk.checked) {
                if (!rank.value || Number(rank.value) <= 0) {
                    e.preventDefault();
                    alert("홈 노출로 선택된 상품은 순서(rank)를 입력해야 합니다.");
                    rank.focus();
                    return;
                }
            }
        }
    });
</script>
</body>
</html>
