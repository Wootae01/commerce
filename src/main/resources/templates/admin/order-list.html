<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 주문 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6fb; }
        .admin-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        }
        .table thead th {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #6c757d;
            border-bottom: 2px solid #e9ecef;
            background: #f8f9fa;
        }
        .table tbody tr:hover { background-color: rgba(77,159,255,0.04); }
        .order-table td, .order-table th { vertical-align: middle; font-size: 0.9rem; }
        .status-badge { font-size: 0.75rem; }
        .filter-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-header :: adminHeader}"></div>

<div class="container-fluid px-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0">주문 관리</h5>
    </div>

    <!-- 검색 / 필터 -->
    <div class="card filter-card mb-3">
        <div class="card-body">
            <form th:action="@{/admin/orders}" method="get">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label text-muted small fw-semibold">검색어</label>
                        <input type="text" class="form-control" name="keyword"
                               placeholder="주문번호 / 이름 / 전화번호"
                               th:value="${param.keyword}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted small fw-semibold">시작일</label>
                        <input type="date" class="form-control" name="startDate"
                               th:value="${param.startDate}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted small fw-semibold">종료일</label>
                        <input type="date" class="form-control" name="endDate"
                               th:value="${param.endDate}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted small fw-semibold">주문 상태</label>
                        <select class="form-select" name="orderStatus">
                            <option value="">전체</option>
                            <option value="PAID">결제완료</option>
                            <option value="WAITING_FOR_PAYMENT">결제대기</option>
                            <option value="PREPARING">배송준비중</option>
                            <option value="SHIPPING">배송중</option>
                            <option value="DELIVERED">배송완료</option>
                            <option value="CANCEL_REQUESTED">취소요청</option>
                            <option value="CANCELED">취소완료</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted small fw-semibold">결제 수단</label>
                        <select class="form-select" name="paymentType">
                            <option value="">전체</option>
                            <option value="CARD">카드</option>
                            <option value="VIRTUAL_ACCOUNT">무통장입금</option>
                        </select>
                    </div>
                    <div class="col-md-1 text-end">
                        <button type="reset" class="btn btn-outline-secondary w-100 mb-1"
                                onclick="window.location.href='/admin/orders'">초기화</button>
                        <button type="submit" class="btn w-100"
                                style="background:#4d9fff; color:#fff; border:none;">검색</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 주문 목록 -->
    <div class="admin-card card">
        <form th:action="@{/admin/orders/status}" method="post">
            <div class="card-header bg-white d-flex justify-content-between align-items-center"
                 style="border-radius:16px 16px 0 0; border-bottom: 1px solid #f0f0f0;">
                <span class="fw-semibold">주문 목록</span>
                <div class="d-flex align-items-center gap-2">
                    <select name="status" class="form-select form-select-sm w-auto">
                        <option value="">상태 선택</option>
                        <option value="PAID">결제완료</option>
                        <option value="PREPARING">배송준비중</option>
                        <option value="SHIPPING">배송중</option>
                        <option value="DELIVERED">배송완료</option>
                        <option value="CANCELED">취소완료</option>
                    </select>
                    <button class="btn btn-sm" type="submit"
                            style="background:#4d9fff; color:#fff; border:none; border-radius:8px;">
                        선택 상태 변경
                    </button>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 order-table">
                        <thead>
                        <tr>
                            <th class="ps-4" style="width:40px;">
                                <input type="checkbox" class="form-check-input" id="checkAll"
                                       onclick="toggleAll(this)">
                            </th>
                            <th>주문번호</th>
                            <th>주문일시</th>
                            <th>주문자</th>
                            <th>연락처</th>
                            <th>결제수단</th>
                            <th class="text-end">결제금액</th>
                            <th>주문상태</th>
                            <th class="text-center pe-4" style="width:100px;">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="9" class="text-center py-5 text-muted">
                                주문이 없습니다.
                            </td>
                        </tr>
                        <tr th:each="order : ${orders}">
                            <td class="ps-4">
                                <input type="checkbox" class="form-check-input order-check"
                                       th:value="${order.id}" name="orderIds">
                            </td>
                            <td>
                                <a th:href="@{|/admin/orders/${order.id}|}"
                                   class="text-decoration-none fw-semibold text-primary"
                                   th:text="${order.orderNumber}"></a>
                            </td>
                            <td class="text-muted small"
                                th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
                            <td th:text="${order.buyerName}"></td>
                            <td class="text-muted" th:text="${order.orderPhone}"></td>
                            <td class="text-muted" th:text="${order.paymentType}"></td>
                            <td class="text-end fw-semibold"
                                th:text="${#numbers.formatInteger(order.totalPrice, 3, 'COMMA')} + '원'"></td>
                            <td>
                                <span class="badge status-badge rounded-pill"
                                      th:text="${order.orderStatus.text}"
                                      th:classappend="${order.orderStatus.name()} == 'PAID' ? ' bg-success' :
                                                      (${order.orderStatus.name()} == 'CANCEL_REQUESTED' ? ' bg-danger' :
                                                      (${order.orderStatus.name()} == 'CANCELED' ? ' bg-secondary' :
                                                      ' bg-warning text-dark'))">
                                </span>
                            </td>
                            <td class="text-center pe-4">
                                <a class="btn btn-sm btn-outline-primary"
                                   th:href="@{|/admin/orders/${order.id}|}">상세</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </form>
        <div th:replace="~{fragments/pagination :: pager('/admin/orders', ${page}, ${qs})}"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleAll(source) {
        document.querySelectorAll('.order-check').forEach(cb => cb.checked = source.checked);
    }
</script>
</body>
</html>
