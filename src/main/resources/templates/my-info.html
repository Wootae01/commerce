<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보 - Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: siteHeader}"></div>

<div class="container py-5" style="max-width: 560px;">

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4 p-md-5">
            <h4 class="fw-bold mb-4">👤 내 정보 수정</h4>

            <form th:action="@{/user/edit}" th:object="${user}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted small">이름</label>
                    <input class="form-control form-control-lg rounded-3" th:field="*{name}"
                           readonly th:errorclass="is-invalid">
                    <div th:errors="*{name}" class="invalid-feedback">이름 에러</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted small">이메일</label>
                    <input class="form-control form-control-lg rounded-3" th:field="*{email}"
                           th:errorclass="is-invalid">
                    <div th:errors="*{email}" class="invalid-feedback">이메일 에러</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted small">연락처</label>
                    <input class="form-control form-control-lg rounded-3" th:field="*{phone}"
                           th:errorclass="is-invalid">
                    <div th:errors="*{phone}" class="invalid-feedback">연락처 에러</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted small">주소</label>
                    <input class="form-control rounded-3 mb-2" th:field="*{address}"
                           th:errorclass="is-invalid" placeholder="기본 주소">
                    <div th:errors="*{address}" class="invalid-feedback">주소 에러</div>
                    <input class="form-control rounded-3" th:field="*{addressDetail}"
                           th:errorclass="is-invalid" placeholder="상세 주소">
                    <div th:errors="*{addressDetail}" class="invalid-feedback">상세 주소 에러</div>
                </div>

                <button class="btn btn-primary btn-lg w-100 rounded-3 mt-3" type="submit">
                    수정 완료
                </button>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
