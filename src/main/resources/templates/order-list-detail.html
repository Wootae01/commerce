<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문 상세 내역</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6fb; }
        .info-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        }
        .section-title { font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6c757d; margin-bottom: 1rem; }
        .info-label { font-weight: 500; color: #6c757d; min-width: 80px; }
        .order-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
        .btn-primary { background-color: #4d9fff; border-color: #4d9fff; border-radius: 8px; }
        .btn-primary:hover { background-color: #3a8de8; border-color: #3a8de8; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader}"></div>

<div class="container py-5" style="max-width: 1000px;">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h4 class="fw-bold mb-1">주문 상세 내역</h4>
            <div class="text-muted small">
                <span th:text="'주문번호 ' + ${order.orderNumber}"></span>
                &nbsp;·&nbsp;
                <span th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd')}"></span>
            </div>
        </div>
        <span class="fw-semibold" style="color: #4d9fff;" th:text="${order.paymentInfo.orderStatus}"></span>
    </div>

    <!-- 주문자 / 배송지 / 결제 정보 -->
    <div class="row g-3 mb-3">
        <div class="col-lg-4">
            <div class="card info-card p-4 h-100">
                <p class="section-title">주문자 정보</p>
                <div class="d-flex mb-2"><div class="info-label">이름</div><div th:text="${order.ordererInfo.name}"></div></div>
                <div class="d-flex mb-2"><div class="info-label">연락처</div><div th:text="${order.ordererInfo.phone}"></div></div>
                <div class="d-flex"><div class="info-label">이메일</div><div th:text="${order.ordererInfo.email}"></div></div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card info-card p-4 h-100">
                <p class="section-title">배송지 정보</p>
                <div class="d-flex mb-2"><div class="info-label">받는 분</div><div th:text="${order.shippingInfo.receiverName}"></div></div>
                <div class="d-flex mb-2"><div class="info-label">연락처</div><div th:text="${order.shippingInfo.getReceiverPhone()}"></div></div>
                <div class="d-flex mb-2">
                    <div class="info-label">주소</div>
                    <div>
                        <div th:text="${order.shippingInfo.address}"></div>
                        <div th:text="${order.shippingInfo.addressDetail}"></div>
                    </div>
                </div>
                <div class="d-flex"><div class="info-label">요청사항</div><div class="text-muted small" th:text="${order.shippingInfo.requestMessage}"></div></div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card info-card p-4 h-100">
                <p class="section-title">결제 정보</p>
                <div class="d-flex mb-2"><div class="info-label">결제 수단</div><div th:text="${order.paymentInfo.paymentMethod}"></div></div>
                <div class="d-flex mb-2"><div class="info-label">주문 상태</div><div th:text="${order.paymentInfo.orderStatus}"></div></div>
                <div class="d-flex mb-2"><div class="info-label">상품 합계</div><div th:text="${#numbers.formatInteger(order.orderPrice.totalPrice, 3, 'COMMA')} + ' 원'"></div></div>
                <div class="d-flex mb-3"><div class="info-label">배송비</div><div th:text="${#numbers.formatInteger(order.orderPrice.deliveryFee, 3, 'COMMA')} + ' 원'"></div></div>
                <hr class="my-2">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">최종 결제금액</span>
                    <span class="text-danger fw-bold fs-5" th:text="${#numbers.formatInteger(order.orderPrice.finalPrice, 3, 'COMMA')} + ' 원'"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 주문 상품 -->
    <div class="card info-card p-4 mb-4">
        <p class="section-title">주문 상품</p>
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>상품 정보</th>
                        <th class="text-center" style="width:120px">수량</th>
                        <th class="text-end" style="width:140px">상품금액</th>
                        <th class="text-end" style="width:140px">합계</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="orderItem : ${order.orderItems}">
                        <td>
                            <a th:href="@{/products/{id}(id=${orderItem.id})}" class="text-decoration-none text-dark d-flex align-items-center">
                                <img th:src="@{${orderItem.mainImageUrl}}" alt="상품 이미지" class="order-item-img me-3">
                                <div class="fw-semibold" th:text="${orderItem.name}"></div>
                            </a>
                        </td>
                        <td class="text-center" th:text="${orderItem.quantity} + '개'"></td>
                        <td class="text-end" th:text="${#numbers.formatInteger(orderItem.unitPrice, 3, 'COMMA')} + '원'"></td>
                        <td class="text-end fw-semibold" th:text="${#numbers.formatInteger(orderItem.totalPrice, 3, 'COMMA')} + '원'"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-end">
        <a th:href="@{/orders/list}" class="btn btn-outline-secondary px-4">목록으로</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
