<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="|${status} - ${title}|">오류</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div th:replace="~{fragments/header :: siteHeader}"></div>

<div class="container py-5" style="max-width: 680px;">

    <div class="text-center mb-4">
        <div class="display-1 fw-bold text-secondary" th:text="${status}">500</div>
        <div class="fs-4 fw-semibold mt-2" th:text="${title}">오류</div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <div class="alert alert-warning d-flex align-items-center mb-4" role="alert">
                <div class="me-2 fs-5">⚠</div>
                <div th:text="${message}">오류가 발생했습니다.</div>
            </div>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
                <a class="btn btn-outline-secondary" onclick="history.back()">이전 페이지</a>
                <a class="btn btn-primary" href="/">홈으로</a>
            </div>

            <div class="text-muted small mt-3">
                ※ 같은 문제가 반복되면 관리자에게 문의하세요.
            </div>

        </div>
    </div>

</div>
</body>
</html>
