<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 - Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #1a1a2e;
        }
        .brand-dot {
            color: #0d6efd;
        }
        .naver-btn {
            background-color: #03C75A;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(3, 199, 90, 0.3);
        }
        .naver-btn:hover {
            background-color: #02ad4f;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(3, 199, 90, 0.4);
        }
        .naver-icon {
            background: #fff;
            color: #03C75A;
            font-weight: 900;
            font-size: 1rem;
            border-radius: 5px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .divider-text {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #adb5bd;
            font-size: 0.85rem;
        }
        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="card login-card mx-auto">
        <div class="card-body p-5">
            <!-- 브랜드 -->
            <div class="text-center mb-4">
                <div class="brand-logo">Commerce<span class="brand-dot">.</span></div>
                <p class="text-muted mt-2 mb-0">소셜 계정으로 간편하게 시작하세요</p>
            </div>

            <!-- 구분선 -->
            <div class="divider-text mb-4">소셜 로그인</div>

            <!-- 네이버 로그인 -->
            <a href="/oauth2/authorization/naver" class="naver-btn">
                <span class="naver-icon">N</span>
                네이버로 시작하기
            </a>

            <!-- 안내 문구 -->
            <p class="text-center text-muted small mt-4 mb-0">
                로그인 시 <a href="#" class="text-muted">이용약관</a> 및
                <a href="#" class="text-muted">개인정보처리방침</a>에 동의합니다.
            </p>
        </div>
    </div>
</div>
</body>
</html>
