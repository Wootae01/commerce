 <!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문하기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6fb; }
        .order-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        .btn-primary { background-color: #4d9fff; border-color: #4d9fff; border-radius: 8px; }
        .btn-primary:hover { background-color: #3a8de8; border-color: #3a8de8; }
    </style>
    <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader}"></div>

<div class="container py-5" style="max-width: 760px;">
    <h4 class="fw-bold mb-4">주문하기</h4>

    <form id="orderForm" th:action="@{/orders}" method="post" th:object="${orderForm}">
        <input type="hidden" th:field="*{orderType}"/>

        <!-- 주문 상품 -->
        <div class="card order-card p-4 mb-4">
            <p class="section-title">주문 상품</p>
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>상품 정보</th>
                        <th class="text-center" style="width:120px">수량</th>
                        <th class="text-end" style="width:140px">상품금액</th>
                        <th class="text-end" style="width:140px">합계</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="orderItem : ${orderItems}">
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:src="@{${orderItem.mainImageUrl}}" alt="상품 이미지"
                                     class="me-3 rounded flex-shrink-0" style="width:60px; height:60px; object-fit:cover; border-radius:10px!important;">
                                <div>
                                    <div class="fw-semibold" th:text="${orderItem.name}"></div>
                                    <div class="text-muted small" th:if="${orderItem.optionName != null}" th:text="'옵션: ' + ${orderItem.optionName}"></div>
                                    <div class="text-muted small" th:text="'수량: ' + ${orderItem.quantity} + '개'"></div>
                                </div>
                            </div>
                            <input type="hidden"
                                   th:if="${orderForm.orderType == T(com.commerce.common.enums.OrderType).CART}"
                                   name="cartProductIds" th:value="${orderItem.id}"/>
                        </td>
                        <td class="text-center" th:text="${orderItem.quantity} + '개'"></td>
                        <td class="text-end" th:text="${#numbers.formatInteger(orderItem.unitPrice, 3, 'COMMA')} + '원'"></td>
                        <td class="text-end fw-semibold" th:text="${#numbers.formatInteger(orderItem.totalPrice, 3, 'COMMA')} + '원'"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="text-end fw-bold mt-3">
                총 상품 금액 <span class="text-danger ms-1" th:text="${#numbers.formatInteger(orderPrice.totalPrice, 3, 'COMMA')} + '원'"></span>
            </div>
            <input type="hidden" th:if="${orderForm.orderType == T(com.commerce.common.enums.OrderType).BUY_NOW}" th:field="*{productId}"/>
            <input type="hidden" th:if="${orderForm.orderType == T(com.commerce.common.enums.OrderType).BUY_NOW}" th:field="*{quantity}"/>
        </div>

        <!-- 배송 정보 -->
        <div class="card order-card p-4 mb-4">
            <p class="section-title">배송 정보</p>
            <div class="mb-3">
                <label class="form-label fw-semibold">받는 사람</label>
                <input type="text" class="form-control" th:field="*{name}" th:errorclass="is-invalid">
                <div class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">연락처</label>
                <input type="text" class="form-control" th:field="*{phone}" th:errorclass="is-invalid">
                <div class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">주소</label>
                <input type="text" class="form-control mb-2" th:field="*{address}" th:errorclass="is-invalid">
                <div class="invalid-feedback"></div>
                <input type="text" class="form-control" placeholder="상세 주소 입력" th:field="*{addressDetail}" th:errorclass="is-invalid">
                <div class="invalid-feedback"></div>
            </div>
            <div>
                <label class="form-label fw-semibold">요청 사항</label>
                <textarea class="form-control" rows="3" th:field="*{requestNote}"></textarea>
            </div>
        </div>

        <!-- 결제 위젯 -->
        <div class="card order-card p-4 mb-4">
            <div id="payment-method"></div>
            <div id="agreement"></div>
        </div>

        <!-- 결제 금액 -->
        <div class="card order-card p-4 mb-4">
            <p class="section-title">결제 금액</p>
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">상품 금액</span>
                <span class="fw-semibold" th:text="${#numbers.formatInteger(orderPrice.totalPrice, 3, 'COMMA')} + '원'"></span>
            </div>
            <div class="d-flex justify-content-between mb-3">
                <span class="text-muted">배송비</span>
                <span class="fw-semibold" th:text="${#numbers.formatInteger(orderPrice.deliveryFee, 3, 'COMMA')} + '원'"></span>
            </div>
            <hr>
            <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold">최종 결제 금액</span>
                <span class="text-danger fw-bold fs-5" th:text="${#numbers.formatInteger(orderPrice.finalPrice, 3, 'COMMA')} + '원'"></span>
            </div>
        </div>

        <button type="button" class="btn btn-primary btn-lg w-100" id="payment-button">결제하기</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    main();

    async function main() {
        const button = document.getElementById("payment-button");
        const clientKey = /*[[${tossClientKey}]]*/ "";
        const customerKey = /*[[${orderForm.customerKey}]]*/ "";
        const finalPrice = Number(/*[[${orderPrice.finalPrice}]]*/ 0);

        const tossPayments = TossPayments(clientKey);
        const widgets = tossPayments.widgets({ customerKey });

        await widgets.setAmount({ currency: "KRW", value: finalPrice });
        await widgets.renderPaymentMethods({ selector: "#payment-method", variantKey: "DEFAULT" });
        await widgets.renderAgreement({ selector: "#agreement", variantKey: "AGREEMENT" });

        button.addEventListener("click", async function (e) {
            e.preventDefault();

            const required = [
                { id: 'name',          msg: '받는 사람을 입력해주세요.' },
                { id: 'phone',         msg: '연락처를 입력해주세요.' },
                { id: 'address',       msg: '주소를 입력해주세요.' },
                { id: 'addressDetail', msg: '상세 주소를 입력해주세요.' },
            ];
            let hasError = false;
            required.forEach(({ id, msg }) => {
                const el = document.getElementById(id);
                const feedback = el.nextElementSibling;
                if (!el.value.trim()) {
                    el.classList.add('is-invalid');
                    if (feedback) feedback.textContent = msg;
                    hasError = true;
                } else {
                    el.classList.remove('is-invalid');
                    if (feedback) feedback.textContent = '';
                }
            });
            if (hasError) {
                document.querySelector('.is-invalid').scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            try {
                const form = document.getElementById("orderForm");
                const res = await fetch("/pay/prepare", { method: "POST", body: new FormData(form) });

                if (!res.ok) {
                    const error = await res.json();
                    alert(error.message || "주문 준비 실패");
                    return;
                }

                const prepared = await res.json();
                await widgets.setAmount({ currency: "KRW", value: Number(prepared.amount) });
                await widgets.requestPayment({
                    orderId: prepared.orderId,
                    orderName: prepared.orderName,
                    successUrl: prepared.successUrl,
                    failUrl: prepared.failUrl,
                    customerName: prepared.customerName,
                    customerMobilePhone: prepared.customerMobilePhone,
                });
            } catch (err) {
                console.log(err);
                alert("결제 요청 중 오류가 발생하였습니다.");
            }
        });
    }
</script>
</body>
</html>
