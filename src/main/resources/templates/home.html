<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }

        /* 히어로 */
        .hero { background: #1a1a2e; min-height: 480px; display: flex; align-items: center; overflow: hidden; }
        .hero-left { padding: 60px 0; }
        .hero-tag { display: inline-block; background: rgba(77,159,255,0.2); color: #4d9fff; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 5px 14px; border-radius: 50px; margin-bottom: 20px; }
        .hero-title { font-size: 3rem; font-weight: 900; color: #fff; line-height: 1.15; margin-bottom: 16px; letter-spacing: -1px; }
        .hero-title em { color: #4d9fff; font-style: normal; }
        .hero-sub { color: rgba(255,255,255,0.6); font-size: 1.05rem; line-height: 1.7; margin-bottom: 32px; }
        .hero-cta { background: #4d9fff; color: #fff; border: none; border-radius: 50px; padding: 14px 36px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .hero-cta:hover { background: #3a8ff0; color: #fff; transform: translateY(-1px); }
        .hero-cta-ghost { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.3); border-radius: 50px; padding: 12px 28px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-left: 12px; text-decoration: none; }
        .hero-cta-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.6); }

        .hero-right { position: relative; height: 480px; overflow: hidden; }
        .hero-right::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0; width: 80px;
            background: linear-gradient(to right, #1a1a2e, transparent);
            z-index: 2;
        }
        .product-float {
            position: absolute;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            overflow: hidden;
            transition: 0.3s;
        }
        .product-float:hover { transform: translateY(-4px); }
        .pf-1 { width: 160px; top: 40px;  left: 60px; }
        .pf-2 { width: 180px; top: 80px;  left: 230px; }
        .pf-3 { width: 155px; top: 255px; left: 80px; }
        .pf-4 { width: 165px; top: 270px; left: 250px; }
        .pf-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .pf-info { padding: 10px 12px; }
        .pf-name { font-size: 0.78rem; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pf-price { font-size: 0.85rem; font-weight: 800; color: #4d9fff; }

        /* 상품 섹션 */
        .section { padding: 56px 0; }
        .section-title { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
        .section-sub { color: #aaa; font-size: 0.88rem; }

        .tab-pill { display: inline-flex; background: #efefef; border-radius: 50px; padding: 4px; margin-bottom: 28px; }
        .tab-pill a { padding: 7px 20px; border-radius: 50px; font-size: 0.88rem; font-weight: 600; color: #666; text-decoration: none; transition: 0.15s; }
        .tab-pill a.active { background: #1a1a2e; color: #fff; }

        .prod-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: 0.2s; border: none; }
        .prod-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.10); }
        .prod-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .prod-card .info { padding: 14px 16px; }
        .prod-card .name { font-size: 0.9rem; font-weight: 600; color: #222; margin-bottom: 6px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .prod-card .price { font-size: 1rem; font-weight: 800; color: #4d9fff; }
    </style>
</head>

<body>
<div th:replace="~{fragments/header :: siteHeader}"></div>

<!-- 히어로 (좌우 분할) -->
<section class="hero">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 hero-left">
                <div class="hero-tag">🔥 이번 주 인기</div>
                <h1 class="hero-title">쇼핑의<br><em>새로운 기준</em></h1>
                <p class="hero-sub">원하는 걸 찾아보세요.</p>
                <div>
                    <a class="hero-cta" href="/products/search">지금 쇼핑하기</a>
                    <a class="hero-cta-ghost" th:href="@{/(tab='popular')}">인기상품 보기</a>
                </div>
            </div>

            <!-- 오른쪽 떠있는 상품 카드 (상품 있을 때만) -->
            <div class="col-lg-6 hero-right d-none d-lg-block"
                 th:if="${products != null and products.size() >= 4}"
                 style="height:480px; position:relative;">
                <a class="product-float pf-1 text-decoration-none"
                   th:href="@{/products/{id}(id=${products[0].id})}">
                    <img class="pf-img" th:src="${products[0].mainImageUrl}" alt="">
                    <div class="pf-info">
                        <div class="pf-name" th:text="${products[0].name}"></div>
                        <div class="pf-price" th:text="${#numbers.formatInteger(products[0].price,0,'COMMA')} + '원'"></div>
                    </div>
                </a>
                <a class="product-float pf-2 text-decoration-none"
                   th:href="@{/products/{id}(id=${products[1].id})}">
                    <img class="pf-img" th:src="${products[1].mainImageUrl}" alt="">
                    <div class="pf-info">
                        <div class="pf-name" th:text="${products[1].name}"></div>
                        <div class="pf-price" th:text="${#numbers.formatInteger(products[1].price,0,'COMMA')} + '원'"></div>
                    </div>
                </a>
                <a class="product-float pf-3 text-decoration-none"
                   th:href="@{/products/{id}(id=${products[2].id})}">
                    <img class="pf-img" th:src="${products[2].mainImageUrl}" alt="">
                    <div class="pf-info">
                        <div class="pf-name" th:text="${products[2].name}"></div>
                        <div class="pf-price" th:text="${#numbers.formatInteger(products[2].price,0,'COMMA')} + '원'"></div>
                    </div>
                </a>
                <a class="product-float pf-4 text-decoration-none"
                   th:href="@{/products/{id}(id=${products[3].id})}">
                    <img class="pf-img" th:src="${products[3].mainImageUrl}" alt="">
                    <div class="pf-info">
                        <div class="pf-name" th:text="${products[3].name}"></div>
                        <div class="pf-price" th:text="${#numbers.formatInteger(products[3].price,0,'COMMA')} + '원'"></div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</section>

<!-- 상품 섹션 -->
<section class="section">
    <div class="container">
        <div class="d-flex justify-content-between align-items-end mb-2">
            <div>
                <div class="section-title">추천 상품</div>
                <div class="section-sub">관리자픽 · 인기상품</div>
            </div>
            <a href="/products/search" style="color:#4d9fff; text-decoration:none; font-size:0.9rem; font-weight:600;">전체보기 →</a>
        </div>

        <div class="tab-pill mt-3">
            <a th:href="@{/(tab='featured')}"
               th:classappend="${tab == 'featured'} ? ' active' : ''">⭐ 관리자픽</a>
            <a th:href="@{/(tab='popular')}"
               th:classappend="${tab == 'popular'} ? ' active' : ''">🔥 인기상품</a>
        </div>

        <!-- 상품 목록 -->
        <div class="row g-3" th:if="${products != null and !#lists.isEmpty(products)}">
            <div class="col-6 col-md-4 col-lg-3" th:each="p : ${products}">
                <a th:href="@{/products/{id}(id=${p.id})}" class="text-decoration-none">
                    <div class="prod-card">
                        <img th:src="${p.mainImageUrl}" alt="product">
                        <div class="info">
                            <div class="name" th:text="${p.name}">상품명</div>
                            <div class="price" th:text="${#numbers.formatInteger(p.price,0,'COMMA')} + '원'">10,000원</div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- 비어있을 때 -->
        <div class="alert alert-secondary rounded-4"
             th:if="${products == null or #lists.isEmpty(products)}">
            <span th:if="${tab == 'featured'}">현재 관리자픽 상품이 없습니다.</span>
            <span th:if="${tab == 'popular'}">현재 인기상품 데이터가 없습니다.</span>
        </div>

        <!-- 페이지네이션 -->
        <div th:replace="~{fragments/pagination :: pager('/', ${page}, 'tab=' + ${tab})}"></div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
