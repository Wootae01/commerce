<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:fragment="siteHeader">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #1a1a2e;">
        <div class="container">
            <!-- 브랜드 -->
            <a class="navbar-brand fw-bold fs-4" href="/" style="letter-spacing:-0.5px;">
                Commerce<span style="color:#0d6efd;">.</span>
            </a>

            <button class="navbar-toggler border-0" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarMain"
                    aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMain">
                <!-- 검색 -->
                <form class="d-flex mx-auto my-2 my-lg-0"
                      style="width:100%; max-width:380px;"
                      role="search" th:action="@{/products/search}" method="get">
                    <div class="input-group">
                        <input class="form-control border-0"
                               style="background:rgba(255,255,255,0.12); color:#fff; border-radius:8px 0 0 8px;"
                               type="search" name="keyword" placeholder="상품 검색...">
                        <button class="btn px-3" type="submit"
                                style="background:#4d9fff; color:#fff; border-radius:0 8px 8px 0;">검색</button>
                    </div>
                </form>

                <!-- 메뉴 -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-1">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-2" href="/cart">🛒 장바구니</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-2" href="/orders/list">📦 주문내역</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-2" href="/user/edit">👤 내 정보</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-sm ms-1 px-3" style="background:#4d9fff; color:#fff; border:none; border-radius:8px;" href="/login">로그인</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit"
                                    class="btn btn-sm ms-1 px-3" style="background:#4d9fff; color:#fff; border:none; border-radius:8px;">로그아웃</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
